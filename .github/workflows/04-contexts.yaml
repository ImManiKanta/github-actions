name: contexts demo
on: [push]

#we can access these env vars in entire workflow
env:
  project: "roboshop"
  component: 'catalogue'
  environment: "dev"

jobs:
  github-context:
    runs-on: ubuntu-latest
    steps:
      - name: print github info
        run: |
          echo "${{ toJson(github) }}"
          echo "${{ github.ref_name }}"
      
      - name: access env variables
        run: |
          echo "Project : $project"
          echo "Component : $component"
          echo "Environment : $environment"

      - name: Print secrets
        run: |
          echo "DB USER NAME: ${{ secrets.DB_USER }}"
          echo "DB PASSWORD: ${{ secrets.DB_PASSWOR }}"
         