name: contexts demo
on: [push]

env:
  project: "roboshop"
  component: 'catalogue'
  environment: "dev"

jobs:
  github-context:
    runs-on: ubuntu-latest
    steps:
      - name: print github info
        run: |
          echo "${{ toJson(github) }}"
          echo "${{ github.ref_name }}"
      
      - name: access env variables
        run: |
          echo "Project : $project"
          echo "Component : $component"
          echo "Environment : $environment"
         